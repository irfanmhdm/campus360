<!DOCTYPE html>
<html ng-app="campus360">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>
    <title>College Dashboard</title>
    
</head>

<body ng-controller="dashboardController">

<h1>{{collegename}}</h1>

<p>Total Students : {{totalStudents}}</p>
<input type="text" ng-model="totalStudents" placeholder="Enter total students">

<button ng-click="totalStudents = totalStudents + 1">Add Student</button>
<p>Total Faculty : {{totalFaculty}}</p>
<input type="text" ng-model="totalFaculty" placeholder="Enter total faculty">
<button ng-click="totalFaculty = totalFaculty + 1">Add Faculty</button>

<div>
    <h2>Student List</h2>
    <ul>
        <li ng-repeat="student in students">{{student}}</li>
    </ul>
    </div>
</body>
</html>
