<!DOCTYPE html>
<html ng-app="campus360">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Dashboard</title>

    <script src="node_modules/angular/angular.min.js"></script>
    <script src="js/app.js"></script>

    <link rel="stylesheet" href="css/style.css">


</head>

<body ng-controller="dashboardController">

    <h1>{{collegename}}</h1>

    <!-- Total Students -->
    <p><strong>Total Students:</strong> {{totalStudents}}</p>

    <input type="number"
           ng-model="totalStudents"
           placeholder="Enter total students">

    <button ng-click="addStudents()">
        Add Student
    </button>

    <br><br>

    <!-- Total Faculty -->
    <p><strong>Total Faculty:</strong> {{totalFaculty}}</p>

    <input type="number"
           ng-model="totalFaculty"
           placeholder="Enter total faculty">

    <button ng-click="totalFaculty = totalFaculty + 1">
        Add Faculty
    </button>

    <br><br>

    <!-- Toggle Student List -->
    <button ng-click="toggleStudent()">
        Toggle Student List
    </button>

    <!-- Student List -->
    <div ng-show="showstudent">
        <h2>Student List</h2>

        <ul>
            <li ng-repeat="student in students">
                {{student}}
            </li>
        </ul>
    </div>

</body>

</html>
